<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SQL 查询 - {{TITLE}}</title>
<style>
:root { color-scheme: light dark; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--vscode-font-family);
  font-size: var(--vscode-font-size);
  color: var(--vscode-foreground);
  background: var(--vscode-editor-background);
  display: flex;
  flex-direction: column;
}
#header {
  padding: 10px 12px;
  border-bottom: 1px solid var(--vscode-panel-border, #444);
  display: flex;
  align-items: center;
  gap: 8px;
}
#title { font-weight: 600; }
#db-badge {
  opacity: 0.8;
  font-size: 0.85em;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--vscode-badge-background);
  color: var(--vscode-badge-foreground);
}
#editor {
  padding: 10px 12px;
  border-bottom: 1px solid var(--vscode-panel-border, #444);
}
#sql-wrap {
  border: 1px solid var(--vscode-editorWidget-border, var(--vscode-input-border, #666));
  border-radius: 4px;
  background: var(--vscode-editor-background);
  height: 280px;
}
#sql-wrap:focus-within {
  border-color: var(--vscode-focusBorder, var(--vscode-editorWidget-border, #666));
}
#sql-editor {
  width: 100%;
  height: 100%;
  border-radius: 4px;
}
#editor-menu {
  position: fixed;
  z-index: 2000;
  display: none;
  min-width: 130px;
  background: var(--vscode-editorWidget-background, var(--vscode-editor-background));
  border: 1px solid var(--vscode-editorWidget-border, var(--vscode-panel-border, #555));
  border-radius: 4px;
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
  padding: 4px;
}
#editor-menu button {
  width: 100%;
  border: none;
  text-align: left;
  border-radius: 3px;
  background: transparent;
  color: var(--vscode-foreground);
  padding: 5px 8px;
}
#editor-menu button:hover {
  background: var(--vscode-list-hoverBackground, var(--vscode-toolbar-hoverBackground));
}
#sql-fallback {
  display: none;
  width: 100%;
  height: 100%;
  border: none;
  outline: none;
  padding: 10px;
  background: transparent;
  color: var(--vscode-input-foreground);
  font-family: var(--vscode-editor-font-family, monospace);
  font-size: 0.9em;
  line-height: 1.45;
}
#actions {
  margin-top: 8px;
  display: flex;
  gap: 8px;
  align-items: center;
}
button {
  border: none;
  border-radius: 3px;
  padding: 5px 14px;
  cursor: pointer;
  background: var(--vscode-button-background);
  color: var(--vscode-button-foreground);
}
button:hover { background: var(--vscode-button-hoverBackground); }
#hint { opacity: 0.65; font-size: 0.85em; }
#status {
  padding: 8px 12px;
  border-bottom: 1px solid var(--vscode-panel-border, #444);
  display: none;
}
#status.ok { color: #89d185; display: block; }
#status.error { color: #f48771; display: block; }
#result { flex: 1; overflow: auto; }
#empty { padding: 30px; opacity: 0.55; }
table { border-collapse: collapse; width: 100%; min-width: max-content; font-size: 0.88em; }
th {
  position: sticky; top: 0; z-index: 1;
  background: var(--vscode-editor-background);
  border-bottom: 2px solid var(--vscode-panel-border, #444);
  text-align: left;
  padding: 6px 10px;
  white-space: nowrap;
}
td {
  border-bottom: 1px solid var(--vscode-panel-border, #333);
  padding: 5px 10px;
  white-space: nowrap;
  max-width: 360px;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
}
.null { opacity: 0.45; font-style: italic; }
/* Cell detail modal */
#modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 100;
}
#modal-overlay.open { display: flex; align-items: center; justify-content: center; }
#modal-box {
  background: var(--vscode-editor-background);
  border: 1px solid var(--vscode-panel-border, #555);
  border-radius: 6px;
  width: min(760px, 92vw);
  max-height: 82vh;
  display: flex;
  flex-direction: column;
}
#modal-header {
  padding: 10px 16px;
  border-bottom: 1px solid var(--vscode-panel-border, #444);
  display: flex;
  align-items: center;
  gap: 8px;
}
#modal-field { font-weight: 600; flex: 1; }
#modal-type {
  font-size: 0.75em;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--vscode-badge-background);
  color: var(--vscode-badge-foreground);
  opacity: 0.85;
}
#modal-close {
  background: none;
  color: var(--vscode-foreground);
  opacity: 0.7;
  padding: 2px 8px;
}
#modal-close:hover { opacity: 1; }
#modal-body {
  overflow: auto;
  padding: 14px 16px;
  font-family: var(--vscode-editor-font-family, monospace);
  font-size: 0.9em;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-all;
}
.jk   { color: #9cdcfe; }
.js   { color: #ce9178; }
.jnum { color: #b5cea8; }
.jb   { color: #569cd6; }
.jn   { color: #808080; font-style: italic; }
</style>
</head>
<body>
<div id="header">
  <div id="title">SQL 查询</div>
  <div id="db-badge">{{DB}}</div>
</div>
<div id="editor">
  <div id="sql-wrap">
    <div id="sql-editor"></div>
    <textarea id="sql-fallback" spellcheck="false">{{DEFAULT_SQL}}</textarea>
  </div>
  <div id="actions">
    <button onclick="runQuery()">执行 (Ctrl/Cmd+Enter)</button>
    <button onclick="exportResult()">导出结果 (CSV)</button>
    <button onclick="exportResult('json')">导出结果 (JSON)</button>
    <span id="hint">仅执行单条 SQL 语句</span>
  </div>
</div>
<div id="status"></div>
<div id="result"><div id="empty">请输入 SQL 并执行</div></div>

<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal-box">
    <div id="modal-header">
      <span id="modal-field"></span>
      <span id="modal-type"></span>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div id="editor-menu">
  <button type="button" data-action="cut">剪切</button>
  <button type="button" data-action="copy">复制</button>
  <button type="button" data-action="paste">粘贴</button>
  <button type="button" data-action="selectAll">全选</button>
</div>

<script src="{{MONACO_LOADER_URI}}"></script>
<script>
const vscode = acquireVsCodeApi();
let resultRows = [];
const editorEl = document.getElementById('sql-editor');
const fallbackEl = document.getElementById('sql-fallback');
const editorMenuEl = document.getElementById('editor-menu');
let saveTimer = null;
let monacoEditor = null;
let monacoRef = null;
let schemaCache = null;
const pendingSchema = new Map();
const schemaReqTimeoutMs = 6000;
let validateTimer = null;
const markerOwner = 'dbviewer-sql';
let menuVisible = false;

const SQL_KEYWORDS = [
  'SELECT','FROM','WHERE','GROUP','BY','ORDER','LIMIT','OFFSET','INSERT','INTO','VALUES','UPDATE','SET','DELETE',
  'CREATE','ALTER','DROP','TABLE','DATABASE','INDEX','VIEW','TRIGGER','PROCEDURE','FUNCTION','PRIMARY','KEY',
  'FOREIGN','REFERENCES','JOIN','LEFT','RIGHT','INNER','OUTER','ON','AS','AND','OR','NOT','NULL','IS','IN',
  'BETWEEN','LIKE','DISTINCT','HAVING','UNION','ALL','CASE','WHEN','THEN','ELSE','END','SHOW','DESC','EXPLAIN',
  'EXISTS','COUNT','SUM','AVG','MIN','MAX','HAVING','USE'
];

const SQL_SNIPPETS = [
  {
    label: 'SELECT template',
    insertText: 'SELECT ${1:*}\nFROM ${2:table_name}\nWHERE ${3:condition};',
    detail: '查询模板'
  },
  {
    label: 'INSERT template',
    insertText: 'INSERT INTO ${1:table_name} (${2:col1, col2})\nVALUES (${3:val1, val2});',
    detail: '插入模板'
  },
  {
    label: 'UPDATE template',
    insertText: 'UPDATE ${1:table_name}\nSET ${2:col} = ${3:value}\nWHERE ${4:condition};',
    detail: '更新模板'
  }
];

function normalizeIdentifier(raw) {
  return String(raw || '').replace(/[`"']/g, '').split('.').pop() || '';
}

function getEditorValue() {
  return monacoEditor ? monacoEditor.getValue() : fallbackEl.value;
}

function setEditorValue(v) {
  const val = String(v || '');
  if (monacoEditor) {
    monacoEditor.setValue(val);
    return;
  }
  fallbackEl.value = val;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function queueSaveDraft() {
  if (saveTimer) { clearTimeout(saveTimer); }
  saveTimer = setTimeout(function() {
    vscode.postMessage({ command: 'saveDraft', sql: getEditorValue() });
  }, 250);
}

function showEditorMenu(x, y) {
  if (!editorMenuEl || !monacoEditor || !monacoEditor.hasTextFocus()) { return; }
  editorMenuEl.style.left = x + 'px';
  editorMenuEl.style.top = y + 'px';
  editorMenuEl.style.display = 'block';
  menuVisible = true;
}

function hideEditorMenu() {
  if (!editorMenuEl) { return; }
  editorMenuEl.style.display = 'none';
  menuVisible = false;
}

function getMonacoSelectionText() {
  if (!monacoEditor) { return ''; }
  const model = monacoEditor.getModel();
  const selection = monacoEditor.getSelection();
  if (!model || !selection || selection.isEmpty()) { return ''; }
  return model.getValueInRange(selection);
}

function replaceMonacoSelection(text) {
  if (!monacoEditor) { return; }
  const selection = monacoEditor.getSelection();
  if (!selection) { return; }
  monacoEditor.executeEdits('clipboard', [{ range: selection, text, forceMoveMarkers: true }]);
}

async function copyFromEditor() {
  if (!monacoEditor) {
    return;
  }
  const selected = getMonacoSelectionText();
  if (!selected) { return; }
  await navigator.clipboard.writeText(selected);
}

async function cutFromEditor() {
  if (!monacoEditor) { return; }
  const selected = getMonacoSelectionText();
  if (!selected) { return; }
  await navigator.clipboard.writeText(selected);
  replaceMonacoSelection('');
}

async function pasteToEditor() {
  if (!monacoEditor) { return; }
  const text = await navigator.clipboard.readText();
  if (typeof text !== 'string') { return; }
  replaceMonacoSelection(text);
}

function selectAllInEditor() {
  if (!monacoEditor || !monacoRef) { return; }
  monacoEditor.trigger('dbviewer', 'editor.action.selectAll', null);
}

async function handleClipboardAction(action) {
  try {
    if (action === 'copy') {
      await copyFromEditor();
    } else if (action === 'cut') {
      await cutFromEditor();
    } else if (action === 'paste') {
      await pasteToEditor();
    } else if (action === 'selectAll') {
      selectAllInEditor();
    }
  } catch (err) {
    setStatus('error', '剪贴板操作失败，请检查系统剪贴板权限');
  }
}

function requestSchema(force) {
  return new Promise(function(resolve) {
    const requestId = 'schema-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
    const timer = setTimeout(function() {
      if (pendingSchema.has(requestId)) {
        pendingSchema.delete(requestId);
        resolve(null);
      }
    }, schemaReqTimeoutMs);
    pendingSchema.set(requestId, { resolve, timer });
    vscode.postMessage({ command: 'getIntellisenseSchema', requestId, force: !!force });
  });
}

function parseAliasMap(sqlText) {
  const aliasMap = new Map();
  const pattern = /\b(?:from|join)\s+([`"\w.]+)(?:\s+(?:as\s+)?)?([`"\w]+)?/ig;
  let match;
  while ((match = pattern.exec(sqlText))) {
    const table = normalizeIdentifier(match[1]);
    const alias = normalizeIdentifier(match[2] || '');
    if (table) {
      aliasMap.set(table.toLowerCase(), table);
      if (alias && alias.toLowerCase() !== table.toLowerCase()) {
        aliasMap.set(alias.toLowerCase(), table);
      }
    }
  }
  return aliasMap;
}

function findTableInSchema(schema, tableOrAlias, aliasMap) {
  if (!schema || !Array.isArray(schema.tables)) { return null; }
  const normalized = normalizeIdentifier(tableOrAlias).toLowerCase();
  const actual = normalizeIdentifier(aliasMap.get(normalized) || tableOrAlias).toLowerCase();
  return schema.tables.find(function(t) {
    return normalizeIdentifier(t.name).toLowerCase() === actual;
  }) || null;
}

function getCompletionContext(prefixText) {
  const tail = prefixText.slice(-300);
  const needsTable = /(?:from|join|into|update|table)\s+[`"\w.]*$/i.test(prefixText);
  const dotMatch = /([`"\w]+)\.([`"\w]*)$/i.exec(prefixText);
  const prefersColumn = /(?:select|where|on|having|set|group\s+by|order\s+by)\s+[`"\w.,\s]*$/i.test(tail);
  return { needsTable, dotMatch, prefersColumn };
}

async function ensureSchema() {
  if (schemaCache && schemaCache.tables) { return schemaCache; }
  schemaCache = await requestSchema(false);
  return schemaCache;
}

function registerIntellisense(monaco) {
  monaco.languages.registerCompletionItemProvider('sql', {
    triggerCharacters: ['.', ' ', '`'],
    provideCompletionItems: async function(model, position) {
      const word = model.getWordUntilPosition(position);
      const range = {
        startLineNumber: position.lineNumber,
        endLineNumber: position.lineNumber,
        startColumn: word.startColumn,
        endColumn: word.endColumn,
      };
      const prefixText = model.getValueInRange({
        startLineNumber: 1,
        startColumn: 1,
        endLineNumber: position.lineNumber,
        endColumn: position.column,
      });

      const schema = await ensureSchema();
      const aliasMap = parseAliasMap(model.getValue());
      const context = getCompletionContext(prefixText);
      const suggestions = [];

      for (const keyword of SQL_KEYWORDS) {
        suggestions.push({
          label: keyword,
          kind: monaco.languages.CompletionItemKind.Keyword,
          insertText: keyword,
          sortText: '3_' + keyword,
          range,
        });
      }

      for (const snippet of SQL_SNIPPETS) {
        suggestions.push({
          label: snippet.label,
          kind: monaco.languages.CompletionItemKind.Snippet,
          insertText: snippet.insertText,
          insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
          detail: snippet.detail,
          sortText: '4_' + snippet.label,
          range,
        });
      }

      if (schema && Array.isArray(schema.tables)) {
        if (context.dotMatch) {
          const tableOrAlias = normalizeIdentifier(context.dotMatch[1]);
          const table = findTableInSchema(schema, tableOrAlias, aliasMap);
          if (table && Array.isArray(table.columns)) {
            for (const col of table.columns) {
              suggestions.push({
                label: col.name,
                kind: monaco.languages.CompletionItemKind.Field,
                insertText: col.name,
                detail: col.columnType || col.dataType || 'column',
                documentation: col.comment || '',
                sortText: '0_' + col.name,
                range,
              });
            }
          }
        } else if (context.needsTable) {
          for (const t of schema.tables) {
            suggestions.push({
              label: t.name,
              kind: monaco.languages.CompletionItemKind.Class,
              insertText: t.name,
              detail: t.type || 'TABLE',
              sortText: '0_' + t.name,
              range,
            });
          }
        } else {
          if (context.prefersColumn) {
            const added = new Set();
            for (const mappedTableName of aliasMap.values()) {
              const table = findTableInSchema(schema, mappedTableName, new Map());
              if (!table || !Array.isArray(table.columns)) { continue; }
              for (const col of table.columns) {
                const key = (table.name + '.' + col.name).toLowerCase();
                if (added.has(key)) { continue; }
                added.add(key);
                suggestions.push({
                  label: col.name,
                  kind: monaco.languages.CompletionItemKind.Field,
                  insertText: col.name,
                  detail: table.name + ' · ' + (col.columnType || col.dataType || 'column'),
                  documentation: col.comment || '',
                  sortText: '0_' + col.name,
                  range,
                });
              }
            }
          }

          for (const t of schema.tables) {
            suggestions.push({
              label: t.name,
              kind: monaco.languages.CompletionItemKind.Class,
              insertText: t.name,
              detail: t.type || 'TABLE',
              sortText: context.prefersColumn ? '2_' + t.name : '1_' + t.name,
              range,
            });
            for (const col of (t.columns || [])) {
              suggestions.push({
                label: col.name,
                kind: monaco.languages.CompletionItemKind.Field,
                insertText: col.name,
                detail: t.name + ' · ' + (col.columnType || col.dataType || 'column'),
                documentation: col.comment || '',
                sortText: context.prefersColumn ? '1_' + col.name : '0_' + col.name,
                range,
              });
            }
          }
        }
      }

      return { suggestions };
    }
  });

  monaco.languages.registerHoverProvider('sql', {
    provideHover: async function(model, position) {
      const wordInfo = model.getWordAtPosition(position);
      if (!wordInfo || !wordInfo.word) { return null; }
      const schema = await ensureSchema();
      const target = normalizeIdentifier(wordInfo.word).toLowerCase();
      if (!schema || !Array.isArray(schema.tables)) { return null; }

      for (const t of schema.tables) {
        if (normalizeIdentifier(t.name).toLowerCase() === target) {
          return {
            range: new monaco.Range(position.lineNumber, wordInfo.startColumn, position.lineNumber, wordInfo.endColumn),
            contents: [
              { value: '**' + t.name + '**' },
              { value: 'Type: ' + (t.type || 'TABLE') },
              { value: 'Columns: ' + (Array.isArray(t.columns) ? t.columns.length : 0) },
            ],
          };
        }
        for (const c of (t.columns || [])) {
          if (normalizeIdentifier(c.name).toLowerCase() === target) {
            const docs = [
              '**' + t.name + '.' + c.name + '**',
              'Type: ' + (c.columnType || c.dataType || ''),
              'Nullable: ' + (c.nullable || ''),
            ];
            if (c.comment) { docs.push('Comment: ' + c.comment); }
            return {
              range: new monaco.Range(position.lineNumber, wordInfo.startColumn, position.lineNumber, wordInfo.endColumn),
              contents: docs.map(function(v) { return { value: v }; }),
            };
          }
        }
      }
      return null;
    }
  });
}

function getCssVar(name, fallback) {
  const v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  return v || fallback;
}

function applyMonacoTheme() {
  if (!monacoRef) { return; }
  const bodyClass = document.body.className || '';
  const isDark = /vscode-dark|vscode-high-contrast/.test(bodyClass);
  monacoRef.editor.defineTheme('dbviewer-vscode', {
    base: isDark ? 'vs-dark' : 'vs',
    inherit: true,
    rules: [],
    colors: {
      'editor.background': getCssVar('--vscode-editor-background', isDark ? '#1e1e1e' : '#ffffff'),
      'editor.foreground': getCssVar('--vscode-editor-foreground', isDark ? '#d4d4d4' : '#333333'),
      'editorLineNumber.foreground': getCssVar('--vscode-editorLineNumber-foreground', isDark ? '#858585' : '#237893'),
      'editorCursor.foreground': getCssVar('--vscode-editorCursor-foreground', isDark ? '#aeafad' : '#000000'),
      'editor.selectionBackground': getCssVar('--vscode-editor-selectionBackground', isDark ? '#264f78' : '#add6ff'),
      'editor.inactiveSelectionBackground': getCssVar('--vscode-editor-inactiveSelectionBackground', isDark ? '#3a3d41' : '#e5ebf1'),
      'editor.lineHighlightBackground': getCssVar('--vscode-editor-lineHighlightBackground', isDark ? '#2a2d2e' : '#f7f7f7'),
      'editorWidget.background': getCssVar('--vscode-editorWidget-background', isDark ? '#252526' : '#f3f3f3'),
      'editorWidget.border': getCssVar('--vscode-editorWidget-border', isDark ? '#454545' : '#c8c8c8'),
      'editorSuggestWidget.background': getCssVar('--vscode-editorSuggestWidget-background', isDark ? '#252526' : '#f3f3f3'),
      'editorSuggestWidget.foreground': getCssVar('--vscode-editorSuggestWidget-foreground', isDark ? '#cccccc' : '#616161'),
      'editorSuggestWidget.border': getCssVar('--vscode-editorSuggestWidget-border', isDark ? '#454545' : '#c8c8c8'),
    },
  });
  monacoRef.editor.setTheme('dbviewer-vscode');
}

function indexToPos(input, index) {
  let line = 1;
  let col = 1;
  for (let i = 0; i < index && i < input.length; i++) {
    if (input[i] === '\n') {
      line += 1;
      col = 1;
    } else {
      col += 1;
    }
  }
  return { lineNumber: line, column: col };
}

function analyzeSql(input) {
  const markers = [];
  let i = 0;
  let quote = '';
  let blockComment = false;
  let lineComment = false;
  let depth = 0;
  let nonWsInStmt = false;
  let stmtCount = 0;
  const openParens = [];

  while (i < input.length) {
    const ch = input[i];
    const next = input[i + 1];

    if (lineComment) {
      if (ch === '\n') { lineComment = false; }
      i += 1;
      continue;
    }

    if (blockComment) {
      if (ch === '*' && next === '/') {
        blockComment = false;
        i += 2;
        continue;
      }
      i += 1;
      continue;
    }

    if (quote) {
      if (ch === '\\') {
        i += 2;
        continue;
      }
      if (ch === quote) {
        quote = '';
      }
      i += 1;
      continue;
    }

    if (ch === '-' && next === '-') {
      lineComment = true;
      i += 2;
      continue;
    }
    if (ch === '/' && next === '*') {
      blockComment = true;
      i += 2;
      continue;
    }
    if (ch === '\'' || ch === '"' || ch === '`') {
      quote = ch;
      i += 1;
      continue;
    }

    if (!/\s/.test(ch)) { nonWsInStmt = true; }

    if (ch === '(') {
      depth += 1;
      openParens.push(i);
    } else if (ch === ')') {
      if (depth === 0) {
        const p = indexToPos(input, i);
        markers.push({
          severity: monacoRef.MarkerSeverity.Error,
          message: '发现多余的右括号 )',
          startLineNumber: p.lineNumber,
          startColumn: p.column,
          endLineNumber: p.lineNumber,
          endColumn: p.column + 1,
        });
      } else {
        depth -= 1;
        openParens.pop();
      }
    } else if (ch === ';') {
      if (nonWsInStmt) {
        stmtCount += 1;
        nonWsInStmt = false;
      }
    }
    i += 1;
  }

  if (nonWsInStmt) { stmtCount += 1; }

  if (quote) {
    const p = indexToPos(input, input.length);
    markers.push({
      severity: monacoRef.MarkerSeverity.Error,
      message: '引号未闭合',
      startLineNumber: p.lineNumber,
      startColumn: Math.max(1, p.column - 1),
      endLineNumber: p.lineNumber,
      endColumn: p.column,
    });
  }

  if (depth > 0 && openParens.length) {
    const idx = openParens[openParens.length - 1];
    const p = indexToPos(input, idx);
    markers.push({
      severity: monacoRef.MarkerSeverity.Error,
      message: '左括号未闭合',
      startLineNumber: p.lineNumber,
      startColumn: p.column,
      endLineNumber: p.lineNumber,
      endColumn: p.column + 1,
    });
  }

  if (stmtCount > 1) {
    markers.push({
      severity: monacoRef.MarkerSeverity.Warning,
      message: '当前页面仅支持执行单条 SQL 语句',
      startLineNumber: 1,
      startColumn: 1,
      endLineNumber: 1,
      endColumn: 2,
    });
  }

  return markers;
}

function scheduleValidation() {
  if (!monacoEditor || !monacoRef) { return; }
  if (validateTimer) { clearTimeout(validateTimer); }
  validateTimer = setTimeout(function() {
    const model = monacoEditor.getModel();
    if (!model) { return; }
    const markers = analyzeSql(monacoEditor.getValue());
    monacoRef.editor.setModelMarkers(model, markerOwner, markers);
  }, 180);
}

function setStatus(type, text) {
  const el = document.getElementById('status');
  el.className = type;
  el.textContent = text;
}

function runQuery() {
  const sqlRaw = getEditorValue();
  const sql = sqlRaw.trim();
  if (!sql) {
    setStatus('error', '请输入 SQL 语句');
    return;
  }
  if (monacoEditor && monacoRef) {
    const model = monacoEditor.getModel();
    if (model) {
      const markers = analyzeSql(sqlRaw);
      monacoRef.editor.setModelMarkers(model, markerOwner, markers);
      const hasError = markers.some(function(m) {
        return m.severity === monacoRef.MarkerSeverity.Error;
      });
      if (hasError) {
        setStatus('error', 'SQL 存在语法问题，请先修复后再执行');
        return;
      }
    }
  }
  vscode.postMessage({ command: 'saveDraft', sql: sqlRaw });
  setStatus('ok', '执行中...');
  vscode.postMessage({ command: 'execute', sql });
}

function csvCell(value) {
  if (value === null || value === undefined) { return ''; }
  const text = typeof value === 'object' ? JSON.stringify(value) : String(value);
  if (/[",\n\r]/.test(text)) {
    return '"' + text.replace(/"/g, '""') + '"';
  }
  return text;
}

function buildCsv(columns, rows) {
  const header = columns.map(csvCell).join(',');
  const lines = rows.map(function(row) {
    return columns.map(function(col) {
      return csvCell(row ? row[col] : '');
    }).join(',');
  });
  return '\uFEFF' + [header].concat(lines).join('\n');
}

function exportResult(format) {
  const fmt = (format || 'csv').toLowerCase();
  if (!Array.isArray(resultRows) || resultRows.length === 0) {
    setStatus('error', '当前没有可导出的查询结果');
    return;
  }
  let content = '';
  if (fmt === 'json') {
    content = JSON.stringify(resultRows, null, 2);
  } else {
    const table = document.querySelector('#result table');
    if (!table) {
      setStatus('error', '当前结果不支持导出');
      return;
    }

    const headers = Array.from(table.querySelectorAll('thead th')).map(function(th) {
      return th.textContent || '';
    });
    if (!headers.length) {
      setStatus('error', '当前结果没有可导出的字段');
      return;
    }
    content = buildCsv(headers, resultRows);
  }

  vscode.postMessage({
    command: 'exportResult',
    format: fmt,
    content,
    db: document.getElementById('db-badge').textContent || 'db',
  });
}

window.addEventListener('message', function(e) {
  const msg = e.data;
  if (msg.type === 'intellisenseSchema') {
    const requestId = String(msg.requestId || '');
    const pending = pendingSchema.get(requestId);
    if (!pending) { return; }
    clearTimeout(pending.timer);
    pendingSchema.delete(requestId);
    if (msg.error) {
      pending.resolve(null);
      return;
    }
    schemaCache = msg.schema || null;
    pending.resolve(schemaCache);
    return;
  }
  if (msg.type === 'init') {
    setEditorValue(String(msg.sql || ''));
    requestSchema(true).catch(function() {});
    return;
  }
  if (msg.type === 'error') {
    setStatus('error', msg.message || '执行失败');
    return;
  }
  if (msg.type === 'exported') {
    setStatus('ok', msg.message || '导出成功');
    return;
  }
  if (msg.type !== 'result') { return; }

  if (msg.mode === 'ok') {
    setStatus('ok', msg.message || '执行成功');
    document.getElementById('result').innerHTML = '<div id="empty">此语句无结果集返回</div>';
    return;
  }

  const columns = msg.columns || [];
  const rows = msg.rows || [];
  resultRows = rows;
  setStatus('ok', '执行成功，返回 ' + rows.length + ' 行');

  if (!columns.length) {
    document.getElementById('result').innerHTML = '<div id="empty">无可展示字段</div>';
    return;
  }

  let html = '<table><thead><tr>' + columns.map(function(c) {
    return '<th>' + esc(c) + '</th>';
  }).join('') + '</tr></thead><tbody>';

  for (let i = 0; i < rows.length; i++) {
    const row = rows[i] || {};
    html += '<tr>' + columns.map(function(c) {
      const v = row[c];
      const attr = ' data-ri="' + i + '" data-col="' + esc(c) + '" onclick="openCell(this)"';
      if (v === null || v === undefined) {
        return '<td class="null"' + attr + '>NULL</td>';
      }
      const text = (typeof v === 'object') ? JSON.stringify(v) : String(v);
      return '<td title="' + esc(text) + '"' + attr + '>' + esc(text) + '</td>';
    }).join('') + '</tr>';
  }
  html += '</tbody></table>';
  document.getElementById('result').innerHTML = html;
});

function openCell(td) {
  const ri = parseInt(td.dataset.ri, 10);
  const col = td.dataset.col;
  const row = resultRows[ri] || {};
  const raw = row[col];

  const fieldEl = document.getElementById('modal-field');
  const typeEl = document.getElementById('modal-type');
  const bodyEl = document.getElementById('modal-body');

  fieldEl.textContent = col || '';
  let parsed = null;
  let isJson = false;

  if (raw !== null && raw !== undefined) {
    if (typeof raw === 'object') {
      parsed = raw;
      isJson = true;
    } else if (typeof raw === 'string') {
      try {
        parsed = JSON.parse(raw);
        isJson = parsed !== null && typeof parsed === 'object';
      } catch (_) {}
    }
  }

  if (raw === null || raw === undefined) {
    typeEl.textContent = 'NULL';
    bodyEl.innerHTML = '<span class="jn">NULL</span>';
  } else if (isJson) {
    typeEl.textContent = Array.isArray(parsed) ? 'JSON Array' : 'JSON Object';
    bodyEl.innerHTML = jsonHL(parsed, 0);
  } else {
    const txt = String(raw);
    typeEl.textContent = 'Text';
    bodyEl.textContent = txt;
  }

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e && e instanceof MouseEvent) {
    const target = e.target;
    if (target !== document.getElementById('modal-overlay') && target !== document.getElementById('modal-close')) {
      return;
    }
  }
  document.getElementById('modal-overlay').classList.remove('open');
}

function jsonHL(val, depth) {
  const pad  = '  '.repeat(depth);
  const pad1 = '  '.repeat(depth + 1);
  if (val === null) return '<span class="jn">null</span>';
  if (typeof val === 'boolean') return '<span class="jb">' + val + '</span>';
  if (typeof val === 'number') return '<span class="jnum">' + val + '</span>';
  if (typeof val === 'string') return '<span class="js">"' + esc(val) + '"</span>';
  if (Array.isArray(val)) {
    if (!val.length) return '[]';
    return '[\n' + val.map(function(v) {
      return pad1 + jsonHL(v, depth + 1);
    }).join(',\n') + '\n' + pad + ']';
  }
  if (typeof val === 'object') {
    const keys = Object.keys(val);
    if (!keys.length) return '{}';
    return '{\n' + keys.map(function(k) {
      return pad1 + '<span class="jk">"' + esc(k) + '"</span>: ' + jsonHL(val[k], depth + 1);
    }).join(',\n') + '\n' + pad + '}';
  }
  return esc(String(val));
}

document.addEventListener('keydown', function(ev) {
  if (monacoEditor && monacoEditor.hasTextFocus() && (ev.metaKey || ev.ctrlKey)) {
    const key = String(ev.key || '').toLowerCase();
    if (key === 'c' || key === 'x' || key === 'v' || key === 'a') {
      ev.preventDefault();
      if (key === 'c') { handleClipboardAction('copy'); }
      if (key === 'x') { handleClipboardAction('cut'); }
      if (key === 'v') { handleClipboardAction('paste'); }
      if (key === 'a') { handleClipboardAction('selectAll'); }
      return;
    }
  }
  if (ev.key === 'Escape') closeModal();
});

document.addEventListener('click', function(ev) {
  if (!menuVisible) { return; }
  const target = ev.target;
  if (target instanceof HTMLElement && editorMenuEl.contains(target)) {
    const action = target.dataset.action;
    if (action) {
      handleClipboardAction(action);
    }
  }
  hideEditorMenu();
});

function setupMonaco() {
  const monacoBase = '{{MONACO_BASE_URI}}';
  if (!window.require || !monacoBase) {
    fallbackEl.style.display = 'block';
    fallbackEl.addEventListener('input', queueSaveDraft);
    return;
  }

  window.MonacoEnvironment = {
    getWorkerUrl: function() {
      const workerSrc = "self.MonacoEnvironment={baseUrl:'" + monacoBase + "'};importScripts('" + monacoBase + "/base/worker/workerMain.js');";
      return 'data:text/javascript;charset=utf-8,' + encodeURIComponent(workerSrc);
    }
  };

  window.require.config({ paths: { vs: monacoBase } });
  window.require(['vs/editor/editor.main'], function() {
    monacoRef = window.monaco;
    registerIntellisense(monacoRef);
    monacoEditor = monacoRef.editor.create(editorEl, {
      value: fallbackEl.value || '',
      language: 'sql',
      automaticLayout: true,
      contextmenu: false,
      minimap: { enabled: false },
      fontSize: 13,
      lineNumbers: 'on',
      wordWrap: 'on',
      suggestOnTriggerCharacters: true,
      quickSuggestions: { other: true, comments: false, strings: false },
      tabSize: 2,
      insertSpaces: true,
    });
    applyMonacoTheme();
    const themeObserver = new MutationObserver(function() {
      applyMonacoTheme();
    });
    themeObserver.observe(document.body, { attributes: true, attributeFilter: ['class', 'style'] });

    monacoEditor.onDidChangeModelContent(function() {
      queueSaveDraft();
      scheduleValidation();
    });
    monacoEditor.addCommand(monacoRef.KeyMod.CtrlCmd | monacoRef.KeyCode.Enter, runQuery);
    editorEl.addEventListener('contextmenu', function(ev) {
      ev.preventDefault();
      monacoEditor.focus();
      showEditorMenu(ev.clientX, ev.clientY);
    });

    editorEl.addEventListener('mousedown', function() {
      if (menuVisible) { hideEditorMenu(); }
    });

    scheduleValidation();
    requestSchema(true).catch(function() {});
  }, function() {
    fallbackEl.style.display = 'block';
    fallbackEl.addEventListener('input', queueSaveDraft);
  });
}

setupMonaco();
vscode.postMessage({ command: 'ready' });
</script>
