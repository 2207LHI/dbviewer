<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SQL 查询 - {{TITLE}}</title>
<style>
:root { color-scheme: light dark; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--vscode-font-family);
  font-size: var(--vscode-font-size);
  color: var(--vscode-foreground);
  background: var(--vscode-editor-background);
  display: flex;
  flex-direction: column;
}
#header {
  padding: 10px 12px;
  border-bottom: 1px solid var(--vscode-panel-border, #444);
  display: flex;
  align-items: center;
  gap: 8px;
}
#title { font-weight: 600; }
#db-badge {
  opacity: 0.8;
  font-size: 0.85em;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--vscode-badge-background);
  color: var(--vscode-badge-foreground);
}
#editor {
  padding: 10px 12px;
  border-bottom: 1px solid var(--vscode-panel-border, #444);
}
#sql-wrap {
  position: relative;
  border: 1px solid var(--vscode-input-border, #666);
  border-radius: 4px;
  background: var(--vscode-input-background);
  min-height: 260px;
}
#sql {
  width: 100%;
  height: 260px;
  resize: vertical;
  padding: 10px;
  border: none;
  border-radius: 4px;
  background: transparent;
  color: transparent;
  caret-color: var(--vscode-input-foreground);
  font-family: var(--vscode-editor-font-family, monospace);
  font-size: 0.9em;
  line-height: 1.45;
  position: relative;
  z-index: 2;
  overflow: auto;
}
#sql:focus {
  outline: none;
}
#sql-highlight {
  position: absolute;
  inset: 0;
  z-index: 1;
  margin: 0;
  padding: 10px;
  pointer-events: none;
  overflow: hidden;
  white-space: pre-wrap;
  word-break: break-word;
  font-family: var(--vscode-editor-font-family, monospace);
  font-size: 0.9em;
  line-height: 1.45;
  color: var(--vscode-input-foreground);
}
.sql-keyword { color: var(--vscode-symbolIcon-keywordForeground, #c586c0); font-weight: 600; }
.sql-string { color: var(--vscode-terminal-ansiGreen, #ce9178); }
.sql-number { color: var(--vscode-terminal-ansiCyan, #b5cea8); }
.sql-comment { color: var(--vscode-descriptionForeground, #6a9955); font-style: italic; }
.sql-operator { color: var(--vscode-symbolIcon-operatorForeground, #d4d4d4); }
.sql-ident { color: var(--vscode-symbolIcon-variableForeground, #9cdcfe); }
.sql-punct { color: var(--vscode-editor-foreground); opacity: 0.8; }
.sql-space { color: transparent; }
.sql-eol::before { content: '\A'; white-space: pre; }
#actions {
  margin-top: 8px;
  display: flex;
  gap: 8px;
  align-items: center;
}
button {
  border: none;
  border-radius: 3px;
  padding: 5px 14px;
  cursor: pointer;
  background: var(--vscode-button-background);
  color: var(--vscode-button-foreground);
}
button:hover { background: var(--vscode-button-hoverBackground); }
#hint { opacity: 0.65; font-size: 0.85em; }
#status {
  padding: 8px 12px;
  border-bottom: 1px solid var(--vscode-panel-border, #444);
  display: none;
}
#status.ok { color: #89d185; display: block; }
#status.error { color: #f48771; display: block; }
#result { flex: 1; overflow: auto; }
#empty { padding: 30px; opacity: 0.55; }
table { border-collapse: collapse; width: 100%; min-width: max-content; font-size: 0.88em; }
th {
  position: sticky; top: 0; z-index: 1;
  background: var(--vscode-editor-background);
  border-bottom: 2px solid var(--vscode-panel-border, #444);
  text-align: left;
  padding: 6px 10px;
  white-space: nowrap;
}
td {
  border-bottom: 1px solid var(--vscode-panel-border, #333);
  padding: 5px 10px;
  white-space: nowrap;
  max-width: 360px;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
}
.null { opacity: 0.45; font-style: italic; }
/* Cell detail modal */
#modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 100;
}
#modal-overlay.open { display: flex; align-items: center; justify-content: center; }
#modal-box {
  background: var(--vscode-editor-background);
  border: 1px solid var(--vscode-panel-border, #555);
  border-radius: 6px;
  width: min(760px, 92vw);
  max-height: 82vh;
  display: flex;
  flex-direction: column;
}
#modal-header {
  padding: 10px 16px;
  border-bottom: 1px solid var(--vscode-panel-border, #444);
  display: flex;
  align-items: center;
  gap: 8px;
}
#modal-field { font-weight: 600; flex: 1; }
#modal-type {
  font-size: 0.75em;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--vscode-badge-background);
  color: var(--vscode-badge-foreground);
  opacity: 0.85;
}
#modal-close {
  background: none;
  color: var(--vscode-foreground);
  opacity: 0.7;
  padding: 2px 8px;
}
#modal-close:hover { opacity: 1; }
#modal-body {
  overflow: auto;
  padding: 14px 16px;
  font-family: var(--vscode-editor-font-family, monospace);
  font-size: 0.9em;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-all;
}
.jk   { color: #9cdcfe; }
.js   { color: #ce9178; }
.jnum { color: #b5cea8; }
.jb   { color: #569cd6; }
.jn   { color: #808080; font-style: italic; }
</style>
</head>
<body>
<div id="header">
  <div id="title">SQL 查询</div>
  <div id="db-badge">{{DB}}</div>
</div>
<div id="editor">
  <div id="sql-wrap">
    <pre id="sql-highlight"></pre>
    <textarea id="sql" spellcheck="false">{{DEFAULT_SQL}}</textarea>
  </div>
  <div id="actions">
    <button onclick="runQuery()">执行 (Ctrl/Cmd+Enter)</button>
    <button onclick="exportResult()">导出结果 (CSV)</button>
    <button onclick="exportResult('json')">导出结果 (JSON)</button>
    <span id="hint">仅执行单条 SQL 语句</span>
  </div>
</div>
<div id="status"></div>
<div id="result"><div id="empty">请输入 SQL 并执行</div></div>

<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal-box">
    <div id="modal-header">
      <span id="modal-field"></span>
      <span id="modal-type"></span>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const vscode = acquireVsCodeApi();
let resultRows = [];
const sqlEl = document.getElementById('sql');
const highlightEl = document.getElementById('sql-highlight');
let saveTimer = null;

const SQL_KEYWORDS = new Set([
  'SELECT','FROM','WHERE','GROUP','BY','ORDER','LIMIT','OFFSET','INSERT','INTO','VALUES','UPDATE','SET','DELETE',
  'CREATE','ALTER','DROP','TABLE','DATABASE','INDEX','VIEW','TRIGGER','PROCEDURE','FUNCTION','PRIMARY','KEY',
  'FOREIGN','REFERENCES','JOIN','LEFT','RIGHT','INNER','OUTER','ON','AS','AND','OR','NOT','NULL','IS','IN',
  'BETWEEN','LIKE','DISTINCT','HAVING','UNION','ALL','CASE','WHEN','THEN','ELSE','END','SHOW','DESC','EXPLAIN'
]);

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function queueSaveDraft() {
  if (saveTimer) { clearTimeout(saveTimer); }
  saveTimer = setTimeout(function() {
    vscode.postMessage({ command: 'saveDraft', sql: sqlEl.value });
  }, 250);
}

function syncHighlightScroll() {
  highlightEl.scrollTop = sqlEl.scrollTop;
  highlightEl.scrollLeft = sqlEl.scrollLeft;
}

function readQuotedToken(input, start, quote) {
  let idx = start + 1;
  while (idx < input.length) {
    const ch = input[idx];
    if (ch === '\\') {
      idx += 2;
      continue;
    }
    if (ch === quote) {
      idx += 1;
      break;
    }
    idx += 1;
  }
  return idx;
}

function renderToken(raw, cls) {
  if (!raw) { return ''; }
  let out = '';
  for (let i = 0; i < raw.length; i++) {
    const ch = raw[i];
    if (ch === '\n') {
      out += '<span class="sql-eol"></span>';
      continue;
    }
    if (ch === ' ') {
      out += '<span class="sql-space"> </span>';
      continue;
    }
    if (ch === '\t') {
      out += '<span class="sql-space">\t</span>';
      continue;
    }
    out += '<span class="' + cls + '">' + esc(ch) + '</span>';
  }
  return out;
}

function renderSqlHighlight(sql) {
  const parts = [];
  let i = 0;

  while (i < sql.length) {
    const ch = sql[i];

    if (/\s/.test(ch)) {
      const start = i;
      while (i < sql.length && /\s/.test(sql[i])) { i++; }
      parts.push(renderToken(sql.slice(start, i), 'sql-space'));
      continue;
    }

    if (ch === '/' && sql[i + 1] === '*') {
      const start = i;
      i += 2;
      while (i < sql.length && !(sql[i] === '*' && sql[i + 1] === '/')) { i++; }
      if (i < sql.length) { i += 2; }
      parts.push(renderToken(sql.slice(start, i), 'sql-comment'));
      continue;
    }

    if (ch === '-' && sql[i + 1] === '-') {
      const start = i;
      i += 2;
      while (i < sql.length && sql[i] !== '\n') { i++; }
      parts.push(renderToken(sql.slice(start, i), 'sql-comment'));
      continue;
    }

    if (ch === '#') {
      const start = i;
      i += 1;
      while (i < sql.length && sql[i] !== '\n') { i++; }
      parts.push(renderToken(sql.slice(start, i), 'sql-comment'));
      continue;
    }

    if (ch === '\'' || ch === '"' || ch === '`') {
      const end = readQuotedToken(sql, i, ch);
      parts.push(renderToken(sql.slice(i, end), 'sql-string'));
      i = end;
      continue;
    }

    if (/\d/.test(ch)) {
      const start = i;
      while (i < sql.length && /[\d._]/.test(sql[i])) { i++; }
      parts.push(renderToken(sql.slice(start, i), 'sql-number'));
      continue;
    }

    if (/[A-Za-z_]/.test(ch)) {
      const start = i;
      while (i < sql.length && /[A-Za-z0-9_$]/.test(sql[i])) { i++; }
      const word = sql.slice(start, i);
      const cls = SQL_KEYWORDS.has(word.toUpperCase()) ? 'sql-keyword' : 'sql-ident';
      parts.push(renderToken(word, cls));
      continue;
    }

    if (/[=<>!+\-*/%|&^~]/.test(ch)) {
      parts.push(renderToken(ch, 'sql-operator'));
      i += 1;
      continue;
    }

    parts.push(renderToken(ch, 'sql-punct'));
    i += 1;
  }

  highlightEl.innerHTML = parts.join('') || '<span class="sql-space"> </span>';
  syncHighlightScroll();
}

function setStatus(type, text) {
  const el = document.getElementById('status');
  el.className = type;
  el.textContent = text;
}

function runQuery() {
  const sql = sqlEl.value.trim();
  if (!sql) {
    setStatus('error', '请输入 SQL 语句');
    return;
  }
  vscode.postMessage({ command: 'saveDraft', sql: sqlEl.value });
  setStatus('ok', '执行中...');
  vscode.postMessage({ command: 'execute', sql });
}

function csvCell(value) {
  if (value === null || value === undefined) { return ''; }
  const text = typeof value === 'object' ? JSON.stringify(value) : String(value);
  if (/[",\n\r]/.test(text)) {
    return '"' + text.replace(/"/g, '""') + '"';
  }
  return text;
}

function buildCsv(columns, rows) {
  const header = columns.map(csvCell).join(',');
  const lines = rows.map(function(row) {
    return columns.map(function(col) {
      return csvCell(row ? row[col] : '');
    }).join(',');
  });
  return '\uFEFF' + [header].concat(lines).join('\n');
}

function exportResult(format) {
  const fmt = (format || 'csv').toLowerCase();
  if (!Array.isArray(resultRows) || resultRows.length === 0) {
    setStatus('error', '当前没有可导出的查询结果');
    return;
  }
  let content = '';
  if (fmt === 'json') {
    content = JSON.stringify(resultRows, null, 2);
  } else {
    const table = document.querySelector('#result table');
    if (!table) {
      setStatus('error', '当前结果不支持导出');
      return;
    }

    const headers = Array.from(table.querySelectorAll('thead th')).map(function(th) {
      return th.textContent || '';
    });
    if (!headers.length) {
      setStatus('error', '当前结果没有可导出的字段');
      return;
    }
    content = buildCsv(headers, resultRows);
  }

  vscode.postMessage({
    command: 'exportResult',
    format: fmt,
    content,
    db: document.getElementById('db-badge').textContent || 'db',
  });
}

function toggleLineComments() {
  const full = sqlEl.value;
  const selStart = sqlEl.selectionStart;
  const selEnd = sqlEl.selectionEnd;

  const lineStart = full.lastIndexOf('\n', Math.max(0, selStart - 1)) + 1;
  let lineEnd = full.indexOf('\n', selEnd);
  if (lineEnd === -1) { lineEnd = full.length; }

  const block = full.slice(lineStart, lineEnd);
  const lines = block.split('\n');
  const hasNonEmpty = lines.some(function(line) { return line.trim().length > 0; });
  const allCommented = hasNonEmpty && lines.every(function(line) {
    if (!line.trim()) { return true; }
    return /^\s*--\s?/.test(line);
  });

  const nextLines = lines.map(function(line) {
    if (!line.trim()) { return line; }
    if (allCommented) {
      return line.replace(/^(\s*)--\s?/, '$1');
    }
    return line.replace(/^(\s*)/, '$1-- ');
  });

  const nextBlock = nextLines.join('\n');
  const nextValue = full.slice(0, lineStart) + nextBlock + full.slice(lineEnd);
  sqlEl.value = nextValue;

  const delta = nextBlock.length - block.length;
  if (selStart === selEnd) {
    sqlEl.selectionStart = selStart;
    sqlEl.selectionEnd = selEnd;
  } else {
    sqlEl.selectionStart = lineStart;
    sqlEl.selectionEnd = selEnd + delta;
  }

  renderSqlHighlight(sqlEl.value);
  queueSaveDraft();
}

function toggleBlockComment() {
  const full = sqlEl.value;
  let selStart = sqlEl.selectionStart;
  let selEnd = sqlEl.selectionEnd;

  if (selStart === selEnd) {
    const lineStart = full.lastIndexOf('\n', Math.max(0, selStart - 1)) + 1;
    let lineEnd = full.indexOf('\n', selEnd);
    if (lineEnd === -1) { lineEnd = full.length; }
    selStart = lineStart;
    selEnd = lineEnd;
  }

  const selected = full.slice(selStart, selEnd);
  const trimmed = selected.trim();
  const isWrapped = trimmed.startsWith('/*') && trimmed.endsWith('*/') && trimmed.length >= 4;

  let nextSelected = '';
  if (isWrapped) {
    const leftTrimCount = selected.length - selected.trimStart().length;
    const rightTrimCount = selected.length - selected.trimEnd().length;
    const coreStart = leftTrimCount + 2;
    const coreEnd = selected.length - rightTrimCount - 2;
    nextSelected = selected.slice(0, leftTrimCount) + selected.slice(coreStart, coreEnd) + selected.slice(selected.length - rightTrimCount);
  } else if (selected.includes('\n')) {
    nextSelected = '/*\n' + selected + '\n*/';
  } else {
    nextSelected = '/* ' + selected + ' */';
  }

  sqlEl.value = full.slice(0, selStart) + nextSelected + full.slice(selEnd);
  sqlEl.selectionStart = selStart;
  sqlEl.selectionEnd = selStart + nextSelected.length;

  renderSqlHighlight(sqlEl.value);
  queueSaveDraft();
}

window.addEventListener('message', function(e) {
  const msg = e.data;
  if (msg.type === 'init') {
    sqlEl.value = String(msg.sql || '');
    renderSqlHighlight(sqlEl.value);
    return;
  }
  if (msg.type === 'error') {
    setStatus('error', msg.message || '执行失败');
    return;
  }
  if (msg.type === 'exported') {
    setStatus('ok', msg.message || '导出成功');
    return;
  }
  if (msg.type !== 'result') { return; }

  if (msg.mode === 'ok') {
    setStatus('ok', msg.message || '执行成功');
    document.getElementById('result').innerHTML = '<div id="empty">此语句无结果集返回</div>';
    return;
  }

  const columns = msg.columns || [];
  const rows = msg.rows || [];
  resultRows = rows;
  setStatus('ok', '执行成功，返回 ' + rows.length + ' 行');

  if (!columns.length) {
    document.getElementById('result').innerHTML = '<div id="empty">无可展示字段</div>';
    return;
  }

  let html = '<table><thead><tr>' + columns.map(function(c) {
    return '<th>' + esc(c) + '</th>';
  }).join('') + '</tr></thead><tbody>';

  for (let i = 0; i < rows.length; i++) {
    const row = rows[i] || {};
    html += '<tr>' + columns.map(function(c) {
      const v = row[c];
      const attr = ' data-ri="' + i + '" data-col="' + esc(c) + '" onclick="openCell(this)"';
      if (v === null || v === undefined) {
        return '<td class="null"' + attr + '>NULL</td>';
      }
      const text = (typeof v === 'object') ? JSON.stringify(v) : String(v);
      return '<td title="' + esc(text) + '"' + attr + '>' + esc(text) + '</td>';
    }).join('') + '</tr>';
  }
  html += '</tbody></table>';
  document.getElementById('result').innerHTML = html;
});

function openCell(td) {
  const ri = parseInt(td.dataset.ri, 10);
  const col = td.dataset.col;
  const row = resultRows[ri] || {};
  const raw = row[col];

  const fieldEl = document.getElementById('modal-field');
  const typeEl = document.getElementById('modal-type');
  const bodyEl = document.getElementById('modal-body');

  fieldEl.textContent = col || '';
  let parsed = null;
  let isJson = false;

  if (raw !== null && raw !== undefined) {
    if (typeof raw === 'object') {
      parsed = raw;
      isJson = true;
    } else if (typeof raw === 'string') {
      try {
        parsed = JSON.parse(raw);
        isJson = parsed !== null && typeof parsed === 'object';
      } catch (_) {}
    }
  }

  if (raw === null || raw === undefined) {
    typeEl.textContent = 'NULL';
    bodyEl.innerHTML = '<span class="jn">NULL</span>';
  } else if (isJson) {
    typeEl.textContent = Array.isArray(parsed) ? 'JSON Array' : 'JSON Object';
    bodyEl.innerHTML = jsonHL(parsed, 0);
  } else {
    const txt = String(raw);
    typeEl.textContent = 'Text';
    bodyEl.textContent = txt;
  }

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e && e instanceof MouseEvent) {
    const target = e.target;
    if (target !== document.getElementById('modal-overlay') && target !== document.getElementById('modal-close')) {
      return;
    }
  }
  document.getElementById('modal-overlay').classList.remove('open');
}

function jsonHL(val, depth) {
  const pad  = '  '.repeat(depth);
  const pad1 = '  '.repeat(depth + 1);
  if (val === null) return '<span class="jn">null</span>';
  if (typeof val === 'boolean') return '<span class="jb">' + val + '</span>';
  if (typeof val === 'number') return '<span class="jnum">' + val + '</span>';
  if (typeof val === 'string') return '<span class="js">"' + esc(val) + '"</span>';
  if (Array.isArray(val)) {
    if (!val.length) return '[]';
    return '[\n' + val.map(function(v) {
      return pad1 + jsonHL(v, depth + 1);
    }).join(',\n') + '\n' + pad + ']';
  }
  if (typeof val === 'object') {
    const keys = Object.keys(val);
    if (!keys.length) return '{}';
    return '{\n' + keys.map(function(k) {
      return pad1 + '<span class="jk">"' + esc(k) + '"</span>: ' + jsonHL(val[k], depth + 1);
    }).join(',\n') + '\n' + pad + '}';
  }
  return esc(String(val));
}

document.addEventListener('keydown', function(ev) {
  if ((ev.key === 'A' || ev.key === 'a') && ev.shiftKey && ev.altKey) {
    ev.preventDefault();
    toggleBlockComment();
    return;
  }
  if (ev.key === '/' && (ev.metaKey || ev.ctrlKey)) {
    ev.preventDefault();
    toggleLineComments();
    return;
  }
  if (ev.key === 'Enter' && (ev.metaKey || ev.ctrlKey)) runQuery();
  if (ev.key === 'Escape') closeModal();
});

sqlEl.addEventListener('input', function() {
  renderSqlHighlight(sqlEl.value);
  queueSaveDraft();
});
sqlEl.addEventListener('scroll', syncHighlightScroll);

renderSqlHighlight(sqlEl.value);
vscode.postMessage({ command: 'ready' });
</script>
</body>
</html>
